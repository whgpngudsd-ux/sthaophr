name: Gitlab Mirroring
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  to_gitlab:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull and Mirror
        run: |
          git config --global user.name "sthaophr"
          git config --global user.email "abbas@sthaophr.com"
          git pull origin main --rebase
          
      - name: Mirror to Gitlab
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: git@gitlab.com:whgpngudsd-ux/sthaophr.git
          ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}
          ssh_username: git
