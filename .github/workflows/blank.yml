name: Push to GitLab

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Pushes to GitLab
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: git@gitlab.com:whgpngudsd/sthaophr.git
          ssh_private_key: ${{ secrets.GITLAB_TOKEN }}
          ssh_username: git
